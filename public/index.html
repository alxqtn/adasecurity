<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tweety</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- Écran de login -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <h1>🐦 Tweety</h1>
      <p class="subtitle">Connectez-vous pour continuer</p>
      <form id="login-form">
        <input type="text" id="username" placeholder="Nom d'utilisateur" required />
        <input type="password" id="password" placeholder="Mot de passe" required />
        <button type="submit">Se connecter</button>
        <p id="login-error" class="error"></p>
      </form>
      <p class="hint">Utilisateurs: alice, bob, charlie</p>
    </div>
  </div>

  <!-- Timeline -->
  <div id="timeline-screen" class="screen hidden">
    <header>
      <h1>🐦 Tweety</h1>
      <div class="user-info">
        <span id="current-user"></span>
        <button id="refresh-btn">Rafraichir</button>
        <button id="logout-btn">Déconnexion</button>
      </div>
    </header>

    <main>
      <!-- Composer -->
      <div class="composer">
        <textarea id="post-content" placeholder="Quoi de neuf?" maxlength="280"></textarea>
        <button id="post-btn">Poster</button>
      </div>

      <!-- Liste des posts -->
      <div id="posts-list"></div>
    </main>
  </div>

  <script src="app.js"></script>
</body>

</html>
